name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: make docker-login
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build and Push Images
        run: |
          TAG=${{ github.sha }} make docker-build-ci
          TAG=${{ github.sha }} make docker-push
          TAG=latest make docker-build-ci
          TAG=latest make docker-push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_READ_TOKEN
          script: |
            cd ~/portfolio

            git pull origin main

            echo $GHCR_READ_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            make prod-update
            docker exec portfolio_app npx prisma db push
