name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: make docker-login
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Build and Push Images
        env:
          VITE_API_URL: "http://57.128.248.214:8800"
        run: |
          TAG=${{ github.sha }} VITE_API_URL=${{ env.VITE_API_URL }} make docker-build-ci
          TAG=${{ github.sha }} make docker-push

          TAG=latest VITE_API_URL=${{ env.VITE_API_URL }} make docker-build-ci
          TAG=latest make docker-push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy config files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker/docker-compose.yml,Makefile"
          target: "~/portfolio"
          strip_components: 0

      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@master
        env:
          BACKEND_DOT_ENV: ${{ secrets.DOT_ENV }}
        with:
          envs: BACKEND_DOT_ENV
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/portfolio

            echo "$BACKEND_DOT_ENV" > docker/.env

            echo ${{ secrets.GHCR_READ_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            make prod-update
            docker exec portfolio_app npx prisma db push
