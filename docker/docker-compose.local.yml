version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: portfolio_db_local
    ports:
      - "51214:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: portfolio_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data

volumes:
  postgres_data_local:
  redis_data_local:
